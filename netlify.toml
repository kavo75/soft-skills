# Build settings
[build]
  command = "jekyll build"   # Jekyll build command
  publish = "_site"          # Directory waar Jekyll de site genereert

# Redirects voor Netlify Identity en admin toegang
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/.netlify/identity/*"
  to = "/admin/"
  status = 200

# Custom 404 pagina redirect (optioneel)
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
