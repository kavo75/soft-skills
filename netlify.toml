# Build settings
[build]
  command = "jekyll build"
  publish = "_site"

# Redirects
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/identity/*"
  to = "/admin/"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
  
[[redirects]]
 from = "/#/invite_token=:token"
 to = "/admin/#/invite_token=:token"
 status = 200
 force = true

